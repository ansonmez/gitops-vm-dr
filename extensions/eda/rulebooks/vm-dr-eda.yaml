---
# EDA Rulebook: VM DR Monitor
# Periodically triggers the Reconcile VMs job to keep Git manifests in sync.
#
# NOTE: ansible.eda.k8s requires the kubernetes.core collection which may not
# be present in all Decision Environments. This rulebook uses ansible.eda.tick
# as a reliable alternative — it triggers reconciliation every 5 minutes,
# complementing the on-prem reconciler CronJob.
#
# For real-time k8s watch (requires DE with kubernetes.core collection):
# replace the source block with:
#   - ansible.eda.k8s:
#       api_version: kubevirt.io/v1
#       kind: VirtualMachine
#       namespace: vmtocloud
#       label_selectors: ["dr.enabled=true"]
#       host: "{{ K8S_AUTH_HOST }}"
#       api_key: "{{ K8S_AUTH_API_KEY }}"
#       verify_ssl: false

- name: VM DR - Periodic reconciliation trigger
  hosts: all
  sources:
    - ansible.eda.tick:
        interval: 300  # every 5 minutes

  rules:
    - name: Periodic reconcile — sync VM manifests to Git
      condition: event.tick is defined
      throttle:
        once_within: 270 seconds
        group_by_attributes:
          - event.tick
      action:
        run_job_template:
          name: "VM DR - Reconcile VMs"
          organization: "Default"
