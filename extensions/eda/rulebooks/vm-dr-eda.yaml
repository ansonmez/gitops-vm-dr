---
# EDA Rulebook: VM DR Monitor
# Watches the vmtocloud namespace on c103 for VirtualMachine events
# and triggers the appropriate AAP job template automatically.
#
# Uses kseremet.eda.k8s source plugin (custom, included in the
# quay.io/koray/eda-de-openshift-aap25 Decision Environment).
#
# Required extra_vars on the EDA Activation:
#   watch_namespace: vmtocloud
#   k8s_host: https://api.c103.anillocal.com:6443
#   k8s_token: <bearer-token>   (set via AAP credential vault, not hardcoded)

- name: VM DR - Watch vmtocloud namespace for VM events
  hosts: all
  sources:
    - kseremet.eda.k8s:
        api_version: kubevirt.io/v1
        kind: VirtualMachine
        namespace: "{{ watch_namespace | default('vmtocloud') }}"
        host: "{{ k8s_host }}"
        api_key: "{{ k8s_token }}"
        verify_ssl: false

  rules:
    - name: VM created or updated — reconcile manifests
      condition: >
        event.k8s_event.type in ["ADDED", "MODIFIED"] and
        event.k8s_event.object.spec.template is defined
      throttle:
        once_after: 10 seconds
        group_by_attributes:
          - event.k8s_event.object.metadata.name
          - event.k8s_event.object.metadata.namespace
      actions:
        - run_job_template:
            name: "VM DR - Reconcile VMs"
            organization: "Default"
            job_args:
              extra_vars:
                vm_objects_list: "{{ (events.values() | map(attribute='k8s_event.object') | list) if events is mapping else [ event.k8s_event.object ] }}"

    - name: VM deleted — garbage collect manifests
      condition: event.k8s_event.type == "DELETED"
      throttle:
        once_after: 10 seconds
        group_by_attributes:
          - event.k8s_event.object.metadata.namespace
      actions:
        - run_job_template:
            name: "VM DR - Garbage Collect"
            organization: "Default"
