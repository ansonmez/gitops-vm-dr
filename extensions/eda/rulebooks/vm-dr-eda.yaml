---
# EDA Rulebook: VM DR Monitor
# Watches the vmtocloud namespace on c103 for VirtualMachine events
# and triggers the appropriate AAP job template automatically.
#
# Deploy this as an EDA Rulebook Activation in AAP on sno16.
# Pass c103 connection details via EDA Activation extra_vars:
#   K8S_AUTH_HOST: https://api.c103.anillocal.com:6443
#   K8S_AUTH_API_KEY: <bearer-token>
#   K8S_AUTH_VERIFY_SSL: "false"

- name: VM DR - Watch vmtocloud namespace for VM events
  hosts: all
  sources:
    - ansible.eda.k8s:
        api_version: kubevirt.io/v1
        kind: VirtualMachine
        namespace: vmtocloud
        label_selectors:
          - "dr.enabled=true"
        host: "{{ K8S_AUTH_HOST | default(lookup('env', 'K8S_AUTH_HOST')) }}"
        api_key: "{{ K8S_AUTH_API_KEY | default(lookup('env', 'K8S_AUTH_API_KEY')) }}"
        verify_ssl: "{{ K8S_AUTH_VERIFY_SSL | default('false') | bool }}"

  rules:
    - name: VM created or updated — reconcile manifests
      condition: event.type in ["ADDED", "MODIFIED"]
      throttle:
        once_within: 30 seconds
        group_by_attributes:
          - event.resource.metadata.namespace
      action:
        run_job_template:
          name: "VM DR - Reconcile VMs"
          organization: "Default"

    - name: VM deleted — garbage collect manifests
      condition: event.type == "DELETED"
      throttle:
        once_within: 10 seconds
        group_by_attributes:
          - event.resource.metadata.namespace
      action:
        run_job_template:
          name: "VM DR - Garbage Collect"
          organization: "Default"
