---
# Sanitizes a single VM manifest and writes it to the Git working directory.
# Also fetches and writes the associated PVC manifest.
# Input var: vm (full VM object from oc get vm -o json)

- name: "{{ vm.metadata.name }} — fetch full VM object"
  ansible.builtin.command:
    cmd: >
      oc get vm {{ vm.metadata.name }} -n {{ namespace }}
      -o json
      --server {{ k8s_host }}
      --token {{ k8s_token }}
      --insecure-skip-tls-verify
  register: vm_raw
  changed_when: false

- name: "{{ vm.metadata.name }} — sanitize and write VM manifest"
  ansible.builtin.copy:
    content: "{{ vm_raw.stdout | from_json | sanitize_vm | to_nice_yaml(indent=2) }}"
    dest: "{{ work_dir }}/vms/base/{{ namespace }}/vm-{{ vm.metadata.name }}.yaml"
  vars:
    # sanitize_vm filter is defined inline via the Python filter below
    # Falls back to manual field removal if filter unavailable
    sanitize_vm: "{{ lookup('template', 'templates/vm_sanitize.py.j2') }}"
  ignore_errors: true

# Fallback: manual sanitization via shell if filter unavailable
- name: "{{ vm.metadata.name }} — sanitize VM via shell (portable)"
  ansible.builtin.shell: |
    oc get vm {{ vm.metadata.name }} -n {{ namespace }} \
      -o json \
      --server {{ k8s_host }} \
      --token {{ k8s_token }} \
      --insecure-skip-tls-verify | \
    python3 -c "
    import json, sys, copy

    vm = json.load(sys.stdin)

    # Strip cluster-specific metadata
    for field in ['resourceVersion', 'uid', 'creationTimestamp', 'generation',
                  'managedFields', 'finalizers', 'ownerReferences']:
        vm['metadata'].pop(field, None)

    # Remove status entirely
    vm.pop('status', None)

    # Remove annotations that are cluster-specific
    annotations = vm['metadata'].get('annotations', {})
    noisy = [k for k in annotations if any(x in k for x in [
        'kubectl.kubernetes.io/last-applied',
        'kubevirt.io/latest-observed-api-version',
        'kubevirt.io/storage-observed-api-version',
    ])]
    for k in noisy:
        annotations.pop(k, None)

    spec = vm.get('spec', {})

    # Remove dataVolumeTemplates
    spec.pop('dataVolumeTemplates', None)

    # Rewrite dataVolume volume refs to persistentVolumeClaim
    volumes = spec.get('template', {}).get('spec', {}).get('volumes', [])
    for vol in volumes:
        if 'dataVolume' in vol:
            claim_name = vol['dataVolume']['name']
            vol.pop('dataVolume')
            vol['persistentVolumeClaim'] = {'claimName': claim_name}

    # Ensure running: false (base manifest — overlays control actual state)
    spec['running'] = False

    import yaml
    print(yaml.dump(vm, default_flow_style=False, allow_unicode=True))
    "
  register: vm_sanitized
  changed_when: false

- name: "{{ vm.metadata.name }} — write sanitized VM to base"
  ansible.builtin.copy:
    content: |
      # AUTO-GENERATED by AAP VM DR Reconciler. Do not edit manually.
      {{ vm_sanitized.stdout }}
    dest: "{{ work_dir }}/vms/base/{{ namespace }}/vm-{{ vm.metadata.name }}.yaml"

- name: "{{ vm.metadata.name }} — write VM copy to cloud overlay (no PVC)"
  ansible.builtin.copy:
    src: "{{ work_dir }}/vms/base/{{ namespace }}/vm-{{ vm.metadata.name }}.yaml"
    dest: "{{ work_dir }}/vms/overlays/cloud/{{ namespace }}/vm-{{ vm.metadata.name }}.yaml"
    remote_src: true

- name: "{{ vm.metadata.name }} — get PVC names from VM spec"
  ansible.builtin.shell: |
    oc get vm {{ vm.metadata.name }} -n {{ namespace }} \
      -o jsonpath='{range .spec.template.spec.volumes[*]}{.persistentVolumeClaim.claimName}{"\n"}{.dataVolume.name}{"\n"}{end}' \
      --server {{ k8s_host }} \
      --token {{ k8s_token }} \
      --insecure-skip-tls-verify | grep -v '^$' | sort -u
  register: pvc_names_raw
  changed_when: false

- name: "{{ vm.metadata.name }} — write PVC manifests to base"
  ansible.builtin.shell: |
    oc get pvc {{ item }} -n {{ namespace }} \
      -o json \
      --server {{ k8s_host }} \
      --token {{ k8s_token }} \
      --insecure-skip-tls-verify | \
    python3 -c "
    import json, sys, yaml

    pvc = json.load(sys.stdin)

    # Strip cluster-specific metadata
    for field in ['resourceVersion', 'uid', 'creationTimestamp', 'generation',
                  'managedFields', 'finalizers', 'ownerReferences', 'annotations']:
        pvc['metadata'].pop(field, None)

    # Strip runtime binding info — let the cluster bind dynamically
    spec = pvc.get('spec', {})
    spec.pop('volumeName', None)
    spec.pop('dataSource', None)
    spec.pop('dataSourceRef', None)

    # Remove status
    pvc.pop('status', None)

    print(yaml.dump(pvc, default_flow_style=False, allow_unicode=True))
    " > {{ work_dir }}/vms/base/{{ namespace }}/pvc-{{ item }}.yaml
  loop: "{{ pvc_names_raw.stdout_lines }}"
  when: pvc_names_raw.stdout_lines | length > 0
  changed_when: true
