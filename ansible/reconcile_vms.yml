---
# VM DR - Reconcile VMs
# Discovers VMs labeled dr.enabled=true in the vmtocloud namespace on c103,
# exports sanitized manifests to the gitops-vm-dr GitHub repo, and commits.
# Run by: AAP job template "VM DR - Reconcile VMs" or EDA on VM create/update.
#
# Required env vars / AAP credentials:
#   K8S_AUTH_HOST      - c103 API URL (injected by AAP "OpenShift or Kubernetes API Bearer Token" credential)
#   K8S_AUTH_API_KEY   - c103 bearer token (injected by same credential)
#   GIT_TOKEN          - GitHub personal access token with repo write (from AAP credential)
#   NAMESPACE          - defaults to vmtocloud
#   GIT_REPO           - defaults to https://github.com/ansonmez/gitops-vm-dr.git
#   GIT_BRANCH         - defaults to main
#   ONPREM_SC          - on-prem StorageClass name (defaults to democratic-csi-nfs)

- name: Reconcile VM DR manifests to Git
  hosts: localhost
  gather_facts: false
  vars:
    namespace: "{{ lookup('env', 'NAMESPACE') | default('vmtocloud', true) }}"
    git_repo: "{{ lookup('env', 'GIT_REPO') | default('https://github.com/ansonmez/gitops-vm-dr.git', true) }}"
    git_branch: "{{ lookup('env', 'GIT_BRANCH') | default('main', true) }}"
    git_token: "{{ lookup('env', 'GIT_TOKEN') }}"
    onprem_sc: "{{ lookup('env', 'ONPREM_SC') | default('democratic-csi-nfs', true) }}"
    k8s_host: "{{ lookup('env', 'K8S_AUTH_HOST') }}"
    k8s_token: "{{ lookup('env', 'K8S_AUTH_API_KEY') }}"
    work_dir: "/tmp/gitops-vm-dr-reconcile"
    dr_label: "dr.enabled=true"

  tasks:
    - name: Ensure git and required tools are present
      ansible.builtin.package:
        name: [git, python3-kubernetes]
        state: present
      become: true
      ignore_errors: true

    - name: Configure git user
      ansible.builtin.shell: |
        git config --global user.email "aap-reconciler@vm-dr"
        git config --global user.name "AAP VM DR Reconciler"

    - name: Clone repo
      ansible.builtin.git:
        repo: "https://ansonmez:{{ git_token }}@{{ git_repo | regex_replace('^https://', '') }}"
        dest: "{{ work_dir }}"
        version: "{{ git_branch }}"
        force: true

    - name: Get VMs with DR label from c103
      ansible.builtin.command:
        cmd: >
          oc get vm -n {{ namespace }} -l {{ dr_label }}
          -o json
          --server {{ k8s_host }}
          --token {{ k8s_token }}
          --insecure-skip-tls-verify
      register: vms_raw
      changed_when: false

    - name: Parse VM list
      ansible.builtin.set_fact:
        vms: "{{ (vms_raw.stdout | from_json)['items'] }}"

    - name: Process each VM
      ansible.builtin.include_tasks: tasks/process_single_vm.yml
      vars:
        vm: "{{ item }}"
      loop: "{{ vms }}"
      loop_control:
        label: "{{ item.metadata.name }}"

    - name: Regenerate base kustomization.yaml from files on disk
      ansible.builtin.shell: |
        set -e
        DIR="{{ work_dir }}/vms/base/{{ namespace }}"
        cat > "$DIR/kustomization.yaml" <<'KUSEOF'
        # AUTO-GENERATED by AAP VM DR Reconciler. Do not edit manually.
        apiVersion: kustomize.config.k8s.io/v1beta1
        kind: Kustomization
        namespace: {{ namespace }}
        resources:
        KUSEOF
        for f in "$DIR"/vm-*.yaml "$DIR"/pvc-*.yaml; do
          [ -f "$f" ] && echo "  - $(basename $f)" >> "$DIR/kustomization.yaml"
        done
      changed_when: true

    - name: Regenerate c103 overlay kustomization.yaml
      ansible.builtin.copy:
        content: |
          # AUTO-GENERATED by AAP VM DR Reconciler. Do not edit manually.
          # Source cluster overlay — VM stays running, PVC managed by ArgoCD.
          apiVersion: kustomize.config.k8s.io/v1beta1
          kind: Kustomization
          namespace: {{ namespace }}
          resources:
            - ../../../base/{{ namespace }}
        dest: "{{ work_dir }}/vms/overlays/c103/{{ namespace }}/kustomization.yaml"

    - name: Regenerate cloud overlay kustomization.yaml from files on disk
      ansible.builtin.shell: |
        set -e
        DIR="{{ work_dir }}/vms/overlays/cloud/{{ namespace }}"
        cat > "$DIR/kustomization.yaml" <<'KUSEOF'
        # AUTO-GENERATED by AAP VM DR Reconciler. Do not edit manually.
        # Cloud/DR overlay — VMs only (no PVCs), halted by default.
        apiVersion: kustomize.config.k8s.io/v1beta1
        kind: Kustomization
        namespace: {{ namespace }}
        resources:
        KUSEOF
        for f in "$DIR"/vm-*.yaml; do
          [ -f "$f" ] && echo "  - $(basename $f)" >> "$DIR/kustomization.yaml"
        done
        echo "components:" >> "$DIR/kustomization.yaml"
        echo "  - components/failover-control" >> "$DIR/kustomization.yaml"
      changed_when: true

    - name: Commit and push changes
      ansible.builtin.shell: |
        set -e
        cd {{ work_dir }}
        # Embed token in remote URL for push auth
        git remote set-url origin "https://ansonmez:{{ git_token }}@{{ git_repo | regex_replace('^https://', '') }}"
        git add -A
        if git diff --cached --quiet; then
          echo "No changes to commit"
        else
          git commit -m "reconcile: sync VM manifests for namespace {{ namespace }}"
          git push origin {{ git_branch }} 2>&1
          echo "Pushed changes"
        fi
      register: git_result
      changed_when: "'Pushed changes' in git_result.stdout"

    - name: Show git result
      ansible.builtin.debug:
        msg: "{{ git_result.stdout }}"

    - name: Cleanup work dir
      ansible.builtin.file:
        path: "{{ work_dir }}"
        state: absent
