---
# VM DR - Garbage Collect
# Removes manifests from Git for VMs that no longer exist (or lost dr.enabled=true label) on c103.
# Also cleans up VolumeSync ReplicationSource (c103) and ReplicationDestination (cloud) for orphaned VMs.
# Run by: AAP job template "VM DR - Garbage Collect" (scheduled every 15 min + EDA on delete events).
#
# Required env vars (injected by AAP credentials):
#   K8S_AUTH_HOST     - c103 API URL     (credential: c103-cluster)
#   K8S_AUTH_API_KEY  - c103 bearer token (credential: c103-cluster)
#   GIT_TOKEN         - GitHub PAT        (credential: github-token-vm-dr)
#   CLOUD_PASS        - cloud cluster admin password (credential: cloud-cluster-password)

- name: Garbage collect orphaned VM manifests from Git and VolumeSync objects
  hosts: localhost
  gather_facts: false
  vars:
    namespace: "{{ lookup('env', 'NAMESPACE') | default('vmtocloud', true) }}"
    git_repo: "{{ lookup('env', 'GIT_REPO') | default('https://github.com/ansonmez/gitops-vm-dr.git', true) }}"
    git_branch: "{{ lookup('env', 'GIT_BRANCH') | default('main', true) }}"
    git_token: "{{ lookup('env', 'GIT_TOKEN') }}"
    k8s_host: "{{ lookup('env', 'K8S_AUTH_HOST') }}"
    k8s_token: "{{ lookup('env', 'K8S_AUTH_API_KEY') }}"
    cloud_host: "{{ lookup('env', 'CLOUD_HOST') | default('https://api.cluster-rd8bp.dynamic.redhatworkshops.io:6443', true) }}"
    cloud_user: "{{ lookup('env', 'CLOUD_USER') | default('admin', true) }}"
    cloud_pass: "{{ lookup('env', 'CLOUD_PASS') }}"
    work_dir: "/tmp/gitops-vm-dr-gc"
    dr_label: "dr.enabled=true"

  tasks:
    - name: Configure git user
      ansible.builtin.shell: |
        git config --global user.email "aap-reconciler@vm-dr"
        git config --global user.name "AAP VM DR Reconciler"

    - name: Clone repo
      ansible.builtin.git:
        repo: "https://ansonmez:{{ git_token }}@{{ git_repo | regex_replace('^https://', '') }}"
        dest: "{{ work_dir }}"
        version: "{{ git_branch }}"
        force: true

    - name: Find vm-*.yaml files in base
      ansible.builtin.find:
        paths: "{{ work_dir }}/vms/base/{{ namespace }}"
        patterns: "vm-*.yaml"
      register: base_vm_files

    - name: Get live VMs with DR label from c103
      ansible.builtin.command:
        cmd: >
          oc get vm -n {{ namespace }} -l {{ dr_label }}
          -o jsonpath='{range .items[*]}{.metadata.name}{"\n"}{end}'
          --server {{ k8s_host }}
          --token {{ k8s_token }}
          --insecure-skip-tls-verify
      register: live_vms_raw
      changed_when: false

    - name: Set live VM name list
      ansible.builtin.set_fact:
        live_vms: "{{ live_vms_raw.stdout_lines | select('ne', '') | list }}"

    - name: Identify orphaned VMs (in Git but not live on c103)
      ansible.builtin.set_fact:
        orphaned_vms: >-
          {{
            base_vm_files.files
            | map(attribute='path')
            | map('basename')
            | map('regex_replace', '^vm-', '')
            | map('regex_replace', '\.yaml$', '')
            | difference(live_vms)
            | list
          }}

    - name: Show orphans
      ansible.builtin.debug:
        msg: "Orphaned VMs to remove: {{ orphaned_vms }}"

    - name: Remove orphaned VM/PVC files from Git (base + cloud overlay)
      ansible.builtin.shell: |
        rm -f "{{ work_dir }}/vms/base/{{ namespace }}/vm-{{ item }}.yaml"
        rm -f "{{ work_dir }}/vms/base/{{ namespace }}/pvc-{{ item }}.yaml"
        rm -f "{{ work_dir }}/vms/overlays/cloud/{{ namespace }}/vm-{{ item }}.yaml"
      loop: "{{ orphaned_vms }}"
      when: orphaned_vms | length > 0

    - name: Regenerate base kustomization.yaml after cleanup
      ansible.builtin.shell: |
        cd {{ work_dir }}/vms/base/{{ namespace }}
        echo "# AUTO-GENERATED by AAP VM DR Reconciler. Do not edit manually." > kustomization.yaml
        echo "apiVersion: kustomize.config.k8s.io/v1beta1" >> kustomization.yaml
        echo "kind: Kustomization" >> kustomization.yaml
        echo "namespace: {{ namespace }}" >> kustomization.yaml
        echo "resources:" >> kustomization.yaml
        for f in vm-*.yaml pvc-*.yaml; do
          [ -f "$f" ] && echo "  - $f" >> kustomization.yaml
        done
        if ! grep -q "^  - " kustomization.yaml; then
          echo "  []" >> kustomization.yaml
        fi
      when: orphaned_vms | length > 0

    - name: Regenerate cloud overlay kustomization.yaml after cleanup
      ansible.builtin.shell: |
        cd {{ work_dir }}/vms/overlays/cloud/{{ namespace }}
        echo "# AUTO-GENERATED by AAP VM DR Reconciler. Do not edit manually." > kustomization.yaml
        echo "# Cloud/DR overlay — VMs only (no PVCs), halted by default." >> kustomization.yaml
        echo "apiVersion: kustomize.config.k8s.io/v1beta1" >> kustomization.yaml
        echo "kind: Kustomization" >> kustomization.yaml
        echo "namespace: {{ namespace }}" >> kustomization.yaml
        echo "resources:" >> kustomization.yaml
        for f in vm-*.yaml; do
          [ -f "$f" ] && echo "  - $f" >> kustomization.yaml
        done
        if ! grep -q "^  - " kustomization.yaml; then
          echo "  []" >> kustomization.yaml
        fi
        echo "components:" >> kustomization.yaml
        echo "  - components/failover-control" >> kustomization.yaml
      when: orphaned_vms | length > 0

    - name: Commit and push cleanup to Git
      ansible.builtin.shell: |
        set -e
        cd {{ work_dir }}
        git remote set-url origin "https://ansonmez:{{ git_token }}@{{ git_repo | regex_replace('^https://', '') }}"
        git add -A
        if git diff --cached --quiet; then
          echo "No changes to commit"
        else
          git commit -m "gc: remove orphaned manifests for {{ orphaned_vms | join(', ') }}"
          git push origin {{ git_branch }} 2>&1
          echo "Pushed changes"
        fi
      register: git_result
      changed_when: "'Pushed changes' in git_result.stdout"
      when: orphaned_vms | length > 0

    # --- VolumeSync cleanup (outside GitOps — reconciled independently of Git state) ---
    # Strategy: find all ReplicationSources on c103, delete any whose VM no longer exists.
    # Then mirror the same logic on cloud for ReplicationDestinations.

    - name: Get all ReplicationSources on c103
      ansible.builtin.command:
        cmd: >
          oc get replicationsource -n {{ namespace }}
          -o jsonpath='{range .items[*]}{.metadata.name}{"\n"}{end}'
          --server {{ k8s_host }}
          --token {{ k8s_token }}
          --insecure-skip-tls-verify
      register: replication_sources_raw
      changed_when: false
      ignore_errors: true

    - name: Identify orphaned ReplicationSources (source whose VM is not live)
      ansible.builtin.set_fact:
        orphaned_sources: >-
          {{
            replication_sources_raw.stdout_lines
            | select('ne', '')
            | map('regex_replace', '-src$', '')
            | difference(live_vms)
            | list
          }}

    - name: Delete orphaned ReplicationSource on c103
      ansible.builtin.command:
        cmd: >
          oc delete replicationsource {{ item }}-src -n {{ namespace }}
          --server {{ k8s_host }}
          --token {{ k8s_token }}
          --insecure-skip-tls-verify
          --ignore-not-found
      loop: "{{ orphaned_sources }}"
      when: orphaned_sources | length > 0
      changed_when: true

    - name: Delete orphaned VolumeSync source snapshot PVC on c103
      ansible.builtin.command:
        cmd: >
          oc delete pvc volsync-{{ item }}-src-src -n {{ namespace }}
          --server {{ k8s_host }}
          --token {{ k8s_token }}
          --insecure-skip-tls-verify
          --ignore-not-found
      loop: "{{ orphaned_sources }}"
      when: orphaned_sources | length > 0
      changed_when: true

    - name: Login to cloud cluster
      ansible.builtin.command:
        cmd: >
          oc login {{ cloud_host }}
          -u {{ cloud_user }}
          -p {{ cloud_pass }}
          --insecure-skip-tls-verify
      changed_when: false
      no_log: true

    - name: Get all ReplicationDestinations on cloud
      ansible.builtin.command:
        cmd: >
          oc get replicationdestination -n {{ namespace }}
          -o jsonpath='{range .items[*]}{.metadata.name}{"\n"}{end}'
          --insecure-skip-tls-verify
      register: replication_destinations_raw
      changed_when: false
      ignore_errors: true

    - name: Identify orphaned ReplicationDestinations (dest whose VM is not live)
      ansible.builtin.set_fact:
        orphaned_destinations: >-
          {{
            replication_destinations_raw.stdout_lines
            | select('ne', '')
            | map('regex_replace', '-dest$', '')
            | difference(live_vms)
            | list
          }}

    - name: Delete orphaned ReplicationDestination on cloud
      ansible.builtin.command:
        cmd: >
          oc delete replicationdestination {{ item }}-dest -n {{ namespace }}
          --insecure-skip-tls-verify
          --ignore-not-found
      loop: "{{ orphaned_destinations }}"
      when: orphaned_destinations | length > 0
      changed_when: true

    - name: Delete orphaned VolumeSync destination PVC on cloud
      ansible.builtin.command:
        cmd: >
          oc delete pvc volsync-{{ item }}-dest-dst -n {{ namespace }}
          --insecure-skip-tls-verify
          --ignore-not-found
      loop: "{{ orphaned_destinations }}"
      when: orphaned_destinations | length > 0
      changed_when: true

    - name: Cleanup work dir
      ansible.builtin.file:
        path: "{{ work_dir }}"
        state: absent
